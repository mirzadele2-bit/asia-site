<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>סדרה</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>דף סדרה</header>

<div class="container">
  <div id="content"></div>
</div>

<script src="data.js"></script>
<script>
const id = new URLSearchParams(window.location.search).get("id");
const item = data.find(x => x.id === id);

const box = document.getElementById("content");

if (!item) {
  box.innerHTML = "<div class='card'>לא נמצא</div>";
} else {
  box.innerHTML = `
    <div class="card">
      <h2>${item.title}</h2>
      <p>${item.description}</p>

      <h3>פרקים</h3>
      ${item.episodes.map(ep =>
        `<p><a href="${ep.link}">${ep.name}</a></p>`
      ).join("")}
    </div>
  `;
}
</script>

</body>
</html>
